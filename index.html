<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Página Web</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #141414;
      --accent:   #c9a84c;
      --accent2:  #e8c97a;
      --text:     #f0ece3;
      --muted:    #7a7469;
      --nav-h:    72px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(13,13,13,.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(201,168,76,.15);
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: .04em;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 8px;
      list-style: none;
    }

    .nav-links a {
      display: inline-block;
      padding: 8px 22px;
      color: var(--text);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 400;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: 1px solid transparent;
      border-radius: 2px;
      transition: color .25s, border-color .25s, background .25s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(201,168,76,.06);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-top: var(--nav-h);
    }

    /* Left: text */
    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 56px 80px 80px;
    }

    .hero-eyebrow {
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .7s .2s forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(3rem, 5.5vw, 6rem);
      line-height: 1.05;
      letter-spacing: -.01em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp .8s .35s forwards;
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent2);
    }

    .hero-sub {
      margin-top: 28px;
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--muted);
      max-width: 44ch;
      opacity: 0;
      animation: fadeUp .8s .5s forwards;
    }

    .hero-cta {
      margin-top: 48px;
      display: flex;
      gap: 16px;
      opacity: 0;
      animation: fadeUp .8s .65s forwards;
    }

    .btn-primary {
      padding: 14px 36px;
      background: var(--accent);
      color: #0d0d0d;
      font-weight: 600;
      font-size: .9rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .2s;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-2px); }

    /* Right: image */
    .hero-visual {
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 1.2s .4s forwards;
    }

    .hero-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(20%) contrast(1.05);
    }

    /* golden overlay strip */
    .hero-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(201,168,76,.18) 0%,
        transparent 60%);
      z-index: 1;
      pointer-events: none;
    }

    /* vertical label on the image */
    .hero-visual::after {
      content: 'BIENVENIDO';
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-size: .65rem;
      letter-spacing: .35em;
      color: var(--accent);
      opacity: .6;
      z-index: 2;
    }

    /* decorative line */
    .deco-line {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      margin: 48px auto 0;
      opacity: 0;
      animation: fadeIn 1s 1.1s forwards;
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .nav-logo { font-size: 1.1rem; }
      .nav-links a { padding: 6px 12px; font-size: .78rem; }

      .hero { grid-template-columns: 1fr; grid-template-rows: auto 55vw; }
      .hero-copy { padding: 48px 28px 36px; }
      .hero-visual { min-height: 55vw; }
    }
  </style>
</head>
<body>

  <!-- ── NAVEGACIÓN ── -->
  <nav>
    <a href="index.html" class="nav-logo">Estudio&nbsp;XYZ</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Inicio</a></li>
      <li><a href="pagina1.html">Naturaleza</a></li>
      <li><a href="pagina2.html">Arquitectura</a></li>
      <li><a href="pagina3.html">Gastronomía</a></li>
    </ul>
  </nav>

  <!-- ── HERO ── -->
  <section class="hero">

    <!-- Texto grande -->
    <div class="hero-copy">
      <p class="hero-eyebrow">Diseño &amp; Creatividad</p>
      <h1 class="hero-title">
        El arte de<br>crear algo<br><em>extraordinario.</em>
      </h1>
      <p class="hero-sub">
        Exploramos ideas que trascienden lo ordinario,
        construyendo experiencias visuales que perduran
        en la memoria de quienes las viven.
      </p>
      <div class="hero-cta">
        <a href="#" class="btn-primary">Descubrir más</a>
      </div>
      <div class="deco-line"></div>
    </div>

    <!-- Imagen -->
    <div class="hero-visual">
      <img
        src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80"
        alt="Paisaje montañoso al amanecer"
      />
    </div>

  </section>

</body>
</html>
